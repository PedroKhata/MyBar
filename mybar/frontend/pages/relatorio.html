<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar — Relatórios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">My<span>Bar</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="contas.html">Contas</a></li>
                <li class="nav-item"><a class="nav-link" href="cardapio.html">Cardápio</a></li>
                <li class="nav-item"><a class="nav-link" href="tipos.html">Tipos de Item</a></li>
                <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuários</a></li>
                <li class="nav-item"><a class="nav-link" href="configuracao.html">Configuração</a></li>
                <li class="nav-item"><a class="nav-link" href="cozinha.html">Cozinha</a></li>
                <li class="nav-item"><a class="nav-link" href="entregas.html">Entregas</a></li>
                <li class="nav-item"><a class="nav-link active" href="relatorio.html">Relatório</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="mb-4">
        <h2 class="mb-1" style="font-weight: 700;">Relatório de Faturação</h2>
        <p style="color: var(--text-secondary); margin: 0;">Gere indicadores consolidados das contas fechadas por período.</p>
    </div>

    <div id="alertArea" class="mb-4" style="display:none;"></div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Data de Início <span class="required">*</span></label>
                    <input type="date" id="dataInicio" class="form-control">
                </div>
                <div class="col-md-5">
                    <label class="form-label">Data de Fim <span class="required">*</span></label>
                    <input type="date" id="dataFim" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn-accent w-100" onclick="gerarRelatorio()">
                        <i class="bi bi-funnel me-2"></i>Gerar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4" id="resultadoRelatorio" style="display: none;">
        <div class="col-md-6">
            <div class="card text-center p-4 h-100" style="border-left: 5px solid #4a9eff;">
                <i class="bi bi-receipt" style="font-size: 2.5rem; color: #4a9eff; margin-bottom: 1rem;"></i>
                <h5 style="color: var(--text-secondary);" class="mb-2">Total de Contas Fechadas</h5>
                <h1 id="relContas" style="color: var(--text-primary); font-weight: 700;">0</h1>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card text-center p-4 h-100" style="border-left: 5px solid var(--success);">
                <i class="bi bi-cash-stack" style="font-size: 2.5rem; color: var(--success); margin-bottom: 1rem;"></i>
                <h5 style="color: var(--text-secondary);" class="mb-2">Faturação Total (Apurada)</h5>
                <h1 id="relFaturamento" style="color: var(--success); font-weight: 700;">R$ 0,00</h1>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    // Preenche com a data de hoje ao carregar
    document.addEventListener('DOMContentLoaded', () => {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataInicio').value = hoje;
        document.getElementById('dataFim').value = hoje;
    });

    async function gerarRelatorio() {
        const inicio = document.getElementById('dataInicio').value;
        const fim = document.getElementById('dataFim').value;

        if (!inicio || !fim) {
            mostrarAlerta('Por favor, preencha as duas datas.', 'error');
            return;
        }

        try {
            const dados = await RelatorioAPI.faturamento(inicio, fim);

            document.getElementById('relContas').textContent = dados.totalContasFechadas;
            document.getElementById('relFaturamento').textContent = `R$ ${parseFloat(dados.faturamentoTotal).toFixed(2).replace('.', ',')}`;

            document.getElementById('resultadoRelatorio').style.display = 'flex';
        } catch (err) {
            mostrarAlerta('Erro ao gerar relatório: ' + err.message, 'error');
            document.getElementById('resultadoRelatorio').style.display = 'none';
        }
    }

    function mostrarAlerta(msg, tipo) {
        const area = document.getElementById('alertArea');
        area.style.display = 'block';
        area.innerHTML = `
                <div class="alert-custom ${tipo === 'error' ? 'alert-error' : 'alert-success'}">
                    <i class="bi bi-${tipo === 'error' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${msg}
                </div>`;
        setTimeout(() => { area.style.display = 'none'; }, 4000);
    }
</script>
</body>
</html>
